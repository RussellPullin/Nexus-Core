    VITE_SUPABASE_URL = 'https://nfdwkbigwvquyldlxooz.supabase.co'
[env]
  DATABASE_PATH = '/data/schedule.db'
  DATA_DIR = '/data'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'nexus_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/auth/ping'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
